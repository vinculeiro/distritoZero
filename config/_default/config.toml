# Change baseurl before deploy
baseurl      = "https://vinculeiro.github.io/distritoZero/"
enableRobotsTXT = true

# Idioma por defecto: galego na raíz; español en /es/
# Valores por idioma: config/_default/languages.toml
defaultContentLanguage           = "gl"
defaultContentLanguageInSubdir   = false

# Theme i18n: https://github.com/CaiJimmy/hugo-theme-stack/tree/master/i18n

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage = false

[pagination]
    pagerSize = 5
